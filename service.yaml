apiVersion: deployments.plural.sh/v1alpha1
kind: Cluster
metadata:
  name: existing
  namespace: default
spec:
  handle: lukasz
---
apiVersion: deployments.plural.sh/v1alpha1
kind: GitRepository
metadata:
  name: tf-hello
  namespace: default
spec:
  url: https://github.com/zreigz/tf-hello.git
---
apiVersion: v1
kind: Secret
metadata:
  name: infrastructurestack
  namespace: default
data:
  secret: dGVzdA==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infrastructurestack-config
  namespace: default
data:
  region: us-east-1
  environment: production
---
apiVersion: deployments.plural.sh/v1alpha1
kind: InfrastructureStack
metadata:
  labels:
    app.kubernetes.io/name: infrastructurestack
    app.kubernetes.io/instance: infrastructurestack-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: test-import
  namespace: default
spec:
  name: "test-import"
  detach: true
  type: TERRAFORM
  configuration:
    version: "0.4.41-terraform-1.8.2"
    image: "ghcr.io/pluralsh/harness"
  repositoryRef:
    name: tf-hello
    namespace: default
  clusterRef:
    name: existing
    namespace: default
  git:
    ref: main
    folder: terraform
  files:
    - mountPath: /tmp
      secretRef:
        name: infrastructurestack
  environment:
    - name: TEST
      value: test
    - name: SECRET
      secretKeyRef:
        name: infrastructurestack
        key: secret
    - name: AWS_REGION
      configMapRef:
        name: infrastructurestack-config
        key: region
    - name: APP_ENV
      configMapRef:
        name: infrastructurestack-config
        key: environment
  jobSpec:
    namespace: default
    raw:
      template:
        metadata:
          namespace: default
        spec:
          containers:
            - name: pi
              image: perl:5.34.0
              command: [ "perl",  "-Mbignum=bpi", "-wle", "print bpi(2000)" ]
          restartPolicy: Never

---
apiVersion: deployments.plural.sh/v1alpha1
kind: GitRepository
metadata:
  name: test
  namespace: default
spec:
  url: https://github.com/zreigz/master-slave.git
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: slave
  namespace: default
spec:
  syncConfig:
    createNamespace: true
    deleteNamespace: true
    enforceNamespace: true
    labels:
      app: helm
    annotations:
      owner: team
  namespace: slave
  name: test-slave
  repositoryRef:
    kind: GitRepository
    name: test
    namespace: default
  git:
    ref: main
    folder: slave
  clusterRef:
    name: existing
    namespace: default
---
apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: master
  namespace: default
spec:
  dependencies:
    - name: "test-slave"
  syncConfig:
    createNamespace: true
    deleteNamespace: true
    enforceNamespace: true
    labels:
      app: helm
    annotations:
      owner: team
  namespace: master
  name: test-master
  repositoryRef:
    kind: GitRepository
    name: test
    namespace: default
  git:
    ref: main
    folder: master
  clusterRef:
    name: existing
    namespace: default
  imports:
    - stackRef:
        name: test-import
        namespace: default